<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const h = React.createElement;

const API = "https://ai.newstar0223.workers.dev";
const DISPLAY_NAMES = {"봉성 정":"봉성","김재철":"재철","김한샘":"한샘","박찬홍":"찬홍","신지은":"지은","정다윤":"다윤","최지영":"지영"};

/* ─── UTILS ─── */
function diffDays(s) {
  if (!s) return 999;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(s); d.setHours(0,0,0,0);
  return Math.floor((d - t) / 864e5);
}
function dLabel(s) {
  if (!s) return { text:"미정", sub:"날짜 미정", lvl:0 };
  const diff = diffDays(s);
  const d = new Date(s);
  const days = ["일","월","화","수","목","금","토"];
  const short = (d.getMonth()+1)+"/"+d.getDate()+"("+days[d.getDay()]+")";
  if (diff < 0)  return { text:"D+"+Math.abs(diff), sub:"마감 초과", lvl:3 };
  if (diff === 0) return { text:"D-Day", sub:"오늘 마감", lvl:3 };
  if (diff <= 3)  return { text:"D-"+diff, sub:short, lvl:2 };
  if (diff <= 7)  return { text:"D-"+diff, sub:short, lvl:1 };
  return { text:"D-"+diff, sub:short, lvl:0 };
}
function getToday() {
  const d = new Date();
  const days = ["일","월","화","수","목","금","토"];
  return (d.getMonth()+1)+"월 "+d.getDate()+"일 "+days[d.getDay()]+"요일";
}

/* ─── TOKENS ─── */
const PROJ = {
  "런케이션":   { color:"#059669", bg:"#ecfdf5", border:"#a7f3d0", dot:"#059669" },
  "취업률":     { color:"#7c3aed", bg:"#f5f3ff", border:"#ddd6fe", dot:"#7c3aed" },
  "인턴십":     { color:"#ea580c", bg:"#fff7ed", border:"#fed7aa", dot:"#ea580c" },
  "해커톤":     { color:"#0284c7", bg:"#f0f9ff", border:"#bae6fd", dot:"#0284c7" },
  "글로벌해커톤":{ color:"#0284c7", bg:"#f0f9ff", border:"#bae6fd", dot:"#0284c7" },
  "데이터관리": { color:"#0891b2", bg:"#ecfeff", border:"#a5f3fc", dot:"#0891b2" },
  "출결관리":   { color:"#0891b2", bg:"#ecfeff", border:"#a5f3fc", dot:"#0891b2" },
  "커뮤니티":   { color:"#c026d3", bg:"#fdf4ff", border:"#f0abfc", dot:"#c026d3" },
  "선발관리":   { color:"#9333ea", bg:"#faf5ff", border:"#d8b4fe", dot:"#9333ea" },
  "입학CRM":    { color:"#4f46e5", bg:"#eef2ff", border:"#c7d2fe", dot:"#4f46e5" },
  "업무":       { color:"#6b7280", bg:"#f9fafb", border:"#e5e7eb", dot:"#9ca3af" },
};
const LVL = [
  { color:"#6b7280", bg:"#f9fafb", border:"#e5e7eb" },
  { color:"#2563eb", bg:"#eff6ff", border:"#bfdbfe" },
  { color:"#d97706", bg:"#fffbeb", border:"#fde68a" },
  { color:"#dc2626", bg:"#fef2f2", border:"#fecaca" },
];

/* ─── COMPONENTS ─── */
function Checkbox({ checked, onToggle }) {
  return h("button", {
    onClick: e => { e.stopPropagation(); onToggle(); },
    style:{
      width:22, height:22, borderRadius:6, flexShrink:0,
      display:"flex", alignItems:"center", justifyContent:"center",
      cursor:"pointer", padding:0, transition:"all 0.15s",
      background: checked ? "#059669" : "#fff",
      border:"1.5px solid "+(checked?"#059669":"#d1d5db"),
    }
  },
    checked && h("svg",{width:11,height:9,viewBox:"0 0 11 9",fill:"none"},
      h("path",{d:"M1 4.5L4 7.5L10 1",stroke:"#fff",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"})
    )
  );
}

function DayBadge({ dl }) {
  const s = LVL[dl.lvl];
  return h("div",{
    style:{ flexShrink:0, textAlign:"center", minWidth:48, padding:"4px 8px", borderRadius:8, background:s.bg, border:"1px solid "+s.border }
  },
    h("p",{style:{fontSize:12,fontWeight:800,color:s.color,lineHeight:1}},dl.text),
    h("p",{style:{fontSize:9.5,color:s.color,opacity:0.7,marginTop:2,whiteSpace:"nowrap"}},dl.sub)
  );
}

function TaskCard({ item, onToggle }) {
  const dl = dLabel(item.deadline);
  const proj = PROJ[item.project] || PROJ["업무"];
  return h("div",{
    onClick: onToggle,
    style:{
      display:"flex", alignItems:"flex-start", gap:10, padding:"13px 14px",
      background:"#fff", borderRadius:14, marginBottom:8,
      border:"1px solid #f0f0f5", boxShadow:"0 1px 4px rgba(0,0,0,0.04)",
      cursor:"pointer", opacity:item.done?0.45:1, transition:"all 0.15s",
    }
  },
    h(Checkbox,{checked:item.done,onToggle}),
    h("div",{style:{flex:1,minWidth:0,paddingTop:1}},
      h("p",{style:{fontSize:13.5,lineHeight:1.55,fontWeight:500,marginBottom:7,color:item.done?"#9ca3af":"#111827",textDecoration:item.done?"line-through":"none",wordBreak:"keep-all"}},item.text),
      item.blocked && h("div",{style:{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,color:"#b45309",marginBottom:6,padding:"2px 8px",borderRadius:6,background:"#fef9c3",border:"1px solid #fde68a"}},"⏸ "+item.blocked),
      h("div",{style:{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}},
        h("span",{style:{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:600,color:proj.color,padding:"2px 8px",borderRadius:6,background:proj.bg,border:"1px solid "+proj.border}},
          h("span",{style:{width:5,height:5,borderRadius:"50%",background:proj.dot,display:"inline-block"}}),
          item.project
        ),
        item.status==="진행 중" && h("span",{style:{fontSize:11,fontWeight:500,color:"#2563eb",padding:"2px 8px",borderRadius:6,background:"#eff6ff",border:"1px solid #bfdbfe"}},"진행중")
      )
    ),
    h(DayBadge,{dl})
  );
}

function MeetingCard({ item, onToggle }) {
  const d = new Date(item.date);
  const diff = diffDays(item.date);
  const isToday = diff===0;
  const label = isToday?"오늘":diff===1?"내일":(d.getMonth()+1)+"/"+d.getDate();
  const ac = isToday?"#dc2626":diff<=1?"#d97706":"#2563eb";
  const acBg = isToday?"#fef2f2":diff<=1?"#fffbeb":"#eff6ff";
  const acBd = isToday?"#fecaca":diff<=1?"#fde68a":"#bfdbfe";
  return h("div",{onClick:onToggle,style:{display:"flex",gap:12,padding:"14px",background:"#fff",borderRadius:14,marginBottom:8,border:isToday?"1px solid #fecaca":"1px solid #f0f0f5",boxShadow:isToday?"0 2px 8px rgba(220,38,38,0.08)":"0 1px 4px rgba(0,0,0,0.04)",cursor:"pointer",opacity:item.done?0.4:1}},
    h("div",{style:{flexShrink:0,width:52,height:52,borderRadius:12,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:acBg,border:"1px solid "+acBd}},
      h("span",{style:{fontSize:10,fontWeight:700,color:ac,marginBottom:2}},label),
      h("span",{style:{fontSize:15,fontWeight:800,color:ac}},item.time)
    ),
    h("div",{style:{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}},
      h("p",{style:{fontSize:15,fontWeight:600,marginBottom:3,color:item.done?"#9ca3af":"#111827",textDecoration:item.done?"line-through":"none"}},item.title),
      h("p",{style:{fontSize:12,color:"#9ca3af"}},item.time+" – "+item.endTime)
    ),
    h(Checkbox,{checked:item.done,onToggle})
  );
}

function StatCard({ label, value, color, bg, border }) {
  return h("div",{style:{flex:1,textAlign:"center",padding:"12px 4px",borderRadius:12,background:bg,border:"1px solid "+border}},
    h("p",{style:{fontSize:20,fontWeight:800,color,lineHeight:1,marginBottom:3}},value),
    h("p",{style:{fontSize:10,fontWeight:600,color,opacity:0.65}},label)
  );
}

function SectionHeader({ label, count, color, bg, border }) {
  return h("div",{style:{display:"flex",alignItems:"center",gap:7,marginBottom:10,paddingLeft:2}},
    h("div",{style:{width:3,height:14,borderRadius:2,background:color}}),
    h("span",{style:{fontSize:12,fontWeight:700,color}},label),
    h("span",{style:{fontSize:11,fontWeight:700,color,padding:"1px 7px",borderRadius:10,background:bg,border:"1px solid "+border}},count)
  );
}

/* ─── MEMBER SELECT ─── */
function MemberSelect({ onSelect }) {
  const members = ["봉성 정","김재철","김한샘","박찬홍","신지은","정다윤","최지영"];
  const colors = ["#3b82f6","#06b6d4","#10b981","#f59e0b","#8b5cf6","#ec4899","#ef4444"];
  return h("div",{style:{height:"100%",display:"flex",flexDirection:"column",background:"#f5f7fa"}},
    h("div",{style:{padding:"60px 24px 30px",textAlign:"center"}},
      h("div",{style:{fontSize:40,marginBottom:12}},"📋"),
      h("h1",{style:{fontSize:22,fontWeight:800,color:"#111827",marginBottom:6}},"모두연 AI 비서"),
      h("p",{style:{fontSize:14,color:"#9ca3af"}},"본인 이름을 선택하세요")
    ),
    h("div",{style:{padding:"0 20px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
      members.map((m,i) => {
        const dn = DISPLAY_NAMES[m]||m;
        return h("button",{key:m,onClick:()=>onSelect(m),style:{
          padding:"20px 16px",borderRadius:16,border:"1px solid #e2e8f0",background:"#fff",
          cursor:"pointer",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",
          transition:"all 0.15s"
        }},
          h("div",{style:{width:48,height:48,borderRadius:"50%",margin:"0 auto 10px",display:"flex",alignItems:"center",justifyContent:"center",background:colors[i]+"18",color:colors[i],fontSize:20,fontWeight:800}},dn.charAt(0)),
          h("div",{style:{fontSize:15,fontWeight:700,color:"#111827"}},dn+"님")
        );
      })
    )
  );
}

/* ─── APP ─── */
function App() {
  const [member, setMember] = useState(localStorage.getItem("ai_biseo_member")||"");
  const [tab, setTab] = useState("tasks");
  const [filter, setFilter] = useState("all");
  const [showDone, setShowDone] = useState(false);
  const [tasks, setTasks] = useState([]);
  const [meetings, setMeetings] = useState([]);
  const [loading, setLoading] = useState(false);
  const [lastSync, setLastSync] = useState("");

  const displayName = DISPLAY_NAMES[member]||member;

  const fetchTasks = useCallback(async () => {
    if (!member) return;
    setLoading(true);
    try {
      const r = await fetch(API+"/tasks?member="+encodeURIComponent(member));
      const d = await r.json();
      if (d.tasks) {
        setTasks(d.tasks.map(t=>({...t,done:false})));
        setLastSync(new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}));
      }
    } catch(e) { console.error(e); }
    setLoading(false);
  }, [member]);

  useEffect(() => { fetchTasks(); }, [fetchTasks]);

  const selectMember = (m) => { localStorage.setItem("ai_biseo_member",m); setMember(m); };
  const changeMember = () => { localStorage.removeItem("ai_biseo_member"); setMember(""); setTasks([]); setMeetings([]); };

  const toggleTask = async (id) => {
    const task = tasks.find(t=>(t.numId||t.id)===id);
    if (!task) return;
    const newDone = !task.done;
    setTasks(p=>p.map(t=>(t.numId||t.id)===id?{...t,done:newDone}:t));
    try { await fetch(API+"/complete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pageId:task.id,undo:!newDone})}); } catch(e){}
  };
  const toggleMtg = id => setMeetings(p=>p.map(m=>m.id===id?{...m,done:!m.done}:m));

  if (!member) return h(MemberSelect,{onSelect:selectMember});

  const active = tasks.filter(t=>!t.done);
  const projList = ["all",...[...new Set(active.map(t=>t.project))].sort()];
  const filtered = active.filter(t=>filter==="all"||t.project===filter).sort((a,b)=>{if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return-1;return new Date(a.deadline)-new Date(b.deadline);});
  const done = tasks.filter(t=>t.done).filter(t=>filter==="all"||t.project===filter);
  const overdue = filtered.filter(t=>t.deadline&&diffDays(t.deadline)<0);
  const dday = filtered.filter(t=>t.deadline&&diffDays(t.deadline)===0);
  const soon = filtered.filter(t=>t.deadline&&diffDays(t.deadline)>0&&diffDays(t.deadline)<=3);
  const week = filtered.filter(t=>t.deadline&&diffDays(t.deadline)>3&&diffDays(t.deadline)<=7);
  const later = filtered.filter(t=>!t.deadline||(diffDays(t.deadline)>7));
  const urgent = overdue.length+dday.length+soon.length;
  const inProg = tasks.filter(t=>!t.done&&t.status==="진행 중").length;
  const doneMtg = meetings.filter(m=>m.done).length;

  function TabIcon({id,active}){
    const stroke=active?"#2563eb":"#9ca3af",sw=active?2:1.5;
    if(id==="tasks") return h("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke,strokeWidth:sw,strokeLinecap:"round",strokeLinejoin:"round"},h("rect",{x:3,y:5,width:18,height:16,rx:3}),h("path",{d:"M8 10h8M8 14h5"}));
    return h("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke,strokeWidth:sw,strokeLinecap:"round",strokeLinejoin:"round"},h("rect",{x:3,y:4,width:18,height:18,rx:3}),h("path",{d:"M3 9h18M8 2v4M16 2v4"}));
  }

  const taskView = h("div",{style:{padding:"16px 16px 100px"}},
    h("div",{style:{display:"flex",gap:6,marginBottom:18,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:2}},
      projList.map(p=>{
        const cnt = p==="all"?active.length:active.filter(t=>t.project===p).length;
        const on = filter===p;
        const pc = p!=="all"?PROJ[p]:null;
        return h("button",{key:p,onClick:()=>setFilter(p),style:{fontSize:12,fontWeight:on?700:500,padding:"7px 14px",borderRadius:20,flexShrink:0,cursor:"pointer",background:on?(pc?pc.bg:"#f1f5f9"):"#fff",color:on?(pc?pc.color:"#374151"):"#9ca3af",border:on?"1.5px solid "+(pc?pc.border:"#cbd5e1"):"1.5px solid #e5e7eb"}},p==="all"?"전체 "+cnt:p+" "+cnt);
      })
    ),
    loading&&tasks.length===0&&h("div",{style:{textAlign:"center",padding:"60px 0"}},h("div",{style:{width:32,height:32,border:"3px solid #e2e8f0",borderTopColor:"#3b82f6",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 12px"}}),h("p",{style:{fontSize:13,color:"#9ca3af"}},"노션에서 불러오는 중...")),
    (overdue.length+dday.length)>0&&h("div",{style:{marginBottom:20}},h(SectionHeader,{label:"긴급",count:overdue.length+dday.length,color:"#dc2626",bg:"#fef2f2",border:"#fecaca"}),[...overdue,...dday].map(t=>h(TaskCard,{key:t.numId||t.id,item:t,onToggle:()=>toggleTask(t.numId||t.id)}))),
    soon.length>0&&h("div",{style:{marginBottom:20}},h(SectionHeader,{label:"마감 임박",count:soon.length,color:"#d97706",bg:"#fffbeb",border:"#fde68a"}),soon.map(t=>h(TaskCard,{key:t.numId||t.id,item:t,onToggle:()=>toggleTask(t.numId||t.id)}))),
    week.length>0&&h("div",{style:{marginBottom:20}},h(SectionHeader,{label:"이번 주",count:week.length,color:"#2563eb",bg:"#eff6ff",border:"#bfdbfe"}),week.map(t=>h(TaskCard,{key:t.numId||t.id,item:t,onToggle:()=>toggleTask(t.numId||t.id)}))),
    later.length>0&&h("div",{style:{marginBottom:20}},h(SectionHeader,{label:"예정",count:later.length,color:"#9ca3af",bg:"#f9fafb",border:"#e5e7eb"}),later.map(t=>h(TaskCard,{key:t.numId||t.id,item:t,onToggle:()=>toggleTask(t.numId||t.id)}))),
    !loading&&filtered.length===0&&h("div",{style:{textAlign:"center",padding:"60px 0"}},h("p",{style:{fontSize:40,marginBottom:12}},"✓"),h("p",{style:{fontSize:17,fontWeight:700,color:"#059669",marginBottom:4}},"모든 업무 완료"),h("p",{style:{fontSize:13,color:"#9ca3af"}},"수고하셨습니다")),
    done.length>0&&h("div",{style:{marginTop:8,paddingTop:14,borderTop:"1px solid #f0f0f5"}},h("button",{onClick:()=>setShowDone(!showDone),style:{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#9ca3af",background:"none",border:"none",cursor:"pointer",padding:"4px 2px"}},h("span",{style:{fontSize:9,display:"inline-block",transition:"transform 0.2s",transform:showDone?"rotate(90deg)":"rotate(0)"}},"▶"),"완료 "+done.length+"건"),showDone&&done.map(t=>h(TaskCard,{key:t.numId||t.id,item:t,onToggle:()=>toggleTask(t.numId||t.id)})))
  );

  const meetView = h("div",{style:{padding:"16px 16px 100px"}},
    meetings.length===0&&h("div",{style:{textAlign:"center",padding:"40px 0"}},h("p",{style:{fontSize:13,color:"#9ca3af"}},"캘린더 연동은 PC 확장프로그램에서 설정하세요")),
    meetings.map(m=>h(MeetingCard,{key:m.id,item:m,onToggle:()=>toggleMtg(m.id)}))
  );

  return h("div",{style:{height:"100%",display:"flex",flexDirection:"column",background:"#f5f7fa"}},
    h("div",{style:{flexShrink:0,background:"#fff",borderBottom:"1px solid #f0f0f5",boxShadow:"0 1px 8px rgba(0,0,0,0.05)",paddingTop:"env(safe-area-inset-top,0px)"}},
      h("div",{style:{padding:"20px 18px 0"}},
        h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:18}},
          h("div",null,
            h("p",{style:{fontSize:11.5,fontWeight:500,color:"#9ca3af",letterSpacing:"0.04em",marginBottom:4}},getToday()),
            h("h1",{style:{fontSize:22,fontWeight:800,color:"#111827",letterSpacing:"-0.02em"}},displayName+"님의 업무 현황")
          ),
          h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            h("button",{onClick:fetchTasks,style:{width:32,height:32,borderRadius:10,border:"1px solid #e2e8f0",background:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},loading?"⏳":"🔄"),
            urgent>0&&h("div",{style:{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:20,background:"#fef2f2",border:"1px solid #fecaca"}},
              h("div",{style:{width:6,height:6,borderRadius:"50%",background:"#ef4444"}}),
              h("span",{style:{fontSize:12,fontWeight:700,color:"#dc2626"}},urgent+"건 긴급")
            )
          )
        ),
        h("div",{style:{display:"flex",gap:8,marginBottom:18}},
          h(StatCard,{label:"긴급",value:urgent,color:"#dc2626",bg:"#fef2f2",border:"#fecaca"}),
          h(StatCard,{label:"진행중",value:inProg,color:"#2563eb",bg:"#eff6ff",border:"#bfdbfe"}),
          h(StatCard,{label:"미완료",value:filtered.length,color:"#d97706",bg:"#fffbeb",border:"#fde68a"}),
          h(StatCard,{label:"일정",value:doneMtg+"/"+meetings.length,color:"#059669",bg:"#ecfdf5",border:"#a7f3d0"})
        ),
        h("div",{style:{display:"flex",borderBottom:"2px solid #f0f0f5"}},
          [{id:"tasks",label:"업무",badge:urgent},{id:"meetings",label:"일정",badge:0}].map(t=>
            h("button",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,padding:"12px 0 10px",fontSize:14,fontWeight:tab===t.id?700:500,color:tab===t.id?"#2563eb":"#9ca3af",background:"transparent",border:"none",cursor:"pointer",borderBottom:tab===t.id?"2px solid #2563eb":"2px solid transparent",marginBottom:"-2px",position:"relative"}},
              t.label,
              t.badge>0&&h("span",{style:{position:"absolute",top:8,right:10,minWidth:17,height:17,borderRadius:9,padding:"0 4px",background:"#ef4444",color:"#fff",fontSize:9,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center"}},t.badge)
            )
          )
        )
      )
    ),
    h("div",{style:{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}},tab==="tasks"?taskView:meetView),
    h("div",{style:{flexShrink:0,background:"#fff",borderTop:"1px solid #f0f0f5",boxShadow:"0 -1px 8px rgba(0,0,0,0.05)",paddingBottom:"env(safe-area-inset-bottom,0px)"}},
      h("div",{style:{display:"flex",padding:"6px 0"}},
        [{id:"tasks",label:"업무"},{id:"meetings",label:"일정"},{id:"switch",label:"전환"}].map(t=>
          h("button",{key:t.id,onClick:()=>t.id==="switch"?changeMember():setTab(t.id),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"8px 0",background:"none",border:"none",cursor:"pointer"}},
            t.id!=="switch"?h(TabIcon,{id:t.id,active:tab===t.id}):h("span",{style:{fontSize:20}},"👤"),
            h("span",{style:{fontSize:10,fontWeight:tab===t.id?700:400,color:t.id==="switch"?"#9ca3af":tab===t.id?"#2563eb":"#9ca3af"}},t.label)
          )
        )
      ),
      lastSync&&h("div",{style:{textAlign:"center",padding:"0 0 6px",fontSize:10,color:"#cbd5e1"}},"마지막 동기화: "+lastSync)
    )
  );
}

ReactDOM.render(h(App,null),document.getElementById("root"));
</script>
</body>
</html>
