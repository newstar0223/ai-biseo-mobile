<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5f7fa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>모두연 AI 비서</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;background:#f5f7fa;color:#111827;touch-action:manipulation}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const h = React.createElement;

/* ─── API ─── */
const WORKER_URL = "https://ai-biseo-worker.newstar0223.workers.dev";

/* ─── UTILS ─── */
function diffDays(s) {
  if (!s) return 999;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(s); d.setHours(0,0,0,0);
  return Math.floor((d - t) / 864e5);
}
function dLabel(s) {
  if (!s) return { text:"미정", sub:"날짜 미정", lvl:0 };
  const diff = diffDays(s);
  const d    = new Date(s);
  const days = ["일","월","화","수","목","금","토"];
  const short = (d.getMonth()+1)+"/"+d.getDate()+"("+days[d.getDay()]+")";
  if (diff < 0)   return { text:"D+"+Math.abs(diff), sub:"마감 초과",  lvl:3 };
  if (diff === 0)  return { text:"D-Day",             sub:"오늘 마감", lvl:3 };
  if (diff <= 3)   return { text:"D-"+diff,           sub:short,       lvl:2 };
  if (diff <= 7)   return { text:"D-"+diff,           sub:short,       lvl:1 };
  return            { text:"D-"+diff,                 sub:short,       lvl:0 };
}
function getToday() {
  const d    = new Date();
  const days = ["일","월","화","수","목","금","토"];
  return (d.getMonth()+1)+"월 "+d.getDate()+"일 "+days[d.getDay()]+"요일";
}

/* ─── TOKENS ─── */
const PROJ = {
  "런케이션":   { color:"#059669", bg:"#ecfdf5", border:"#a7f3d0", dot:"#059669" },
  "취업률":     { color:"#7c3aed", bg:"#f5f3ff", border:"#ddd6fe", dot:"#7c3aed" },
  "인턴십":     { color:"#ea580c", bg:"#fff7ed", border:"#fed7aa", dot:"#ea580c" },
  "해커톤":     { color:"#0284c7", bg:"#f0f9ff", border:"#bae6fd", dot:"#0284c7" },
};
const LVL = [
  { color:"#6b7280", bg:"#f9fafb", border:"#e5e7eb" },
  { color:"#2563eb", bg:"#eff6ff", border:"#bfdbfe" },
  { color:"#d97706", bg:"#fffbeb", border:"#fde68a" },
  { color:"#dc2626", bg:"#fef2f2", border:"#fecaca" },
];

/* ─── COMPONENTS ─── */
function Checkbox({ checked, onToggle }) {
  return h("button", {
    onClick: e => { e.stopPropagation(); onToggle(); },
    style:{
      width:22, height:22, borderRadius:6, flexShrink:0,
      display:"flex", alignItems:"center", justifyContent:"center",
      cursor:"pointer", padding:0, transition:"all 0.15s",
      background: checked ? "#059669" : "#fff",
      border:"1.5px solid "+(checked?"#059669":"#d1d5db"),
      boxShadow: checked ? "none" : "0 1px 2px rgba(0,0,0,0.05)",
    }
  },
    checked && h("svg",{width:11,height:9,viewBox:"0 0 11 9",fill:"none"},
      h("path",{d:"M1 4.5L4 7.5L10 1",stroke:"#fff",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"})
    )
  );
}

function DayBadge({ dl }) {
  const s = LVL[dl.lvl];
  return h("div",{
    style:{ flexShrink:0, textAlign:"center", minWidth:48, padding:"4px 8px", borderRadius:8, background:s.bg, border:"1px solid "+s.border }
  },
    h("p",{style:{fontSize:12,fontWeight:800,color:s.color,lineHeight:1}},dl.text),
    h("p",{style:{fontSize:9.5,color:s.color,opacity:0.7,marginTop:2,whiteSpace:"nowrap"}},dl.sub)
  );
}

function TaskCard({ item, onToggle }) {
  const dl   = dLabel(item.deadline);
  const proj = PROJ[item.project] || { color:"#6b7280", bg:"#f9fafb", border:"#e5e7eb", dot:"#9ca3af" };
  return h("div",{
    onClick: onToggle,
    style:{
      display:"flex", alignItems:"flex-start", gap:10, padding:"13px 14px",
      background:"#fff", borderRadius:14, marginBottom:8,
      border:"1px solid #f0f0f5", boxShadow:"0 1px 4px rgba(0,0,0,0.04)",
      cursor:"pointer", opacity:item.done?0.45:1, transition:"all 0.15s",
    }
  },
    h(Checkbox,{checked:item.done,onToggle}),
    h("div",{style:{flex:1,minWidth:0,paddingTop:1}},
      h("p",{
        style:{
          fontSize:13.5,lineHeight:1.55,fontWeight:500,marginBottom:7,
          color:item.done?"#9ca3af":"#111827",
          textDecoration:item.done?"line-through":"none",
          wordBreak:"keep-all",
        }
      },item.text),
      item.blocked && h("div",{
        style:{
          display:"inline-flex",alignItems:"center",gap:4,
          fontSize:11,color:"#b45309",marginBottom:6,
          padding:"2px 8px",borderRadius:6,
          background:"#fef9c3",border:"1px solid #fde68a",
        }
      },"⏸ "+item.blocked),
      h("div",{style:{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}},
        h("span",{
          style:{
            display:"inline-flex",alignItems:"center",gap:4,
            fontSize:11,fontWeight:600,color:proj.color,
            padding:"2px 8px",borderRadius:6,
            background:proj.bg,border:"1px solid "+proj.border,
          }
        },
          h("span",{style:{width:5,height:5,borderRadius:"50%",background:proj.dot,display:"inline-block"}}),
          item.project
        ),
        item.status==="진행 중" && h("span",{
          style:{fontSize:11,fontWeight:500,color:"#2563eb",padding:"2px 8px",borderRadius:6,background:"#eff6ff",border:"1px solid #bfdbfe"}
        },"진행중"),
        item.assignee && h("span",{
          style:{fontSize:11,fontWeight:500,color:"#6b7280",padding:"2px 8px",borderRadius:6,background:"#f9fafb",border:"1px solid #e5e7eb"}
        },"👤 "+item.assignee)
      )
    ),
    h(DayBadge,{dl})
  );
}

function MeetingCard({ item, onToggle }) {
  const d    = new Date(item.date);
  const days = ["일","월","화","수","목","금","토"];
  const diff = diffDays(item.date);
  const isToday = diff===0;
  const label   = isToday?"오늘":diff===1?"내일":(d.getMonth()+1)+"/"+d.getDate();
  const ac   = isToday?"#dc2626":diff<=1?"#d97706":"#2563eb";
  const acBg = isToday?"#fef2f2":diff<=1?"#fffbeb":"#eff6ff";
  const acBd = isToday?"#fecaca":diff<=1?"#fde68a":"#bfdbfe";
  return h("div",{
    onClick:onToggle,
    style:{
      display:"flex",gap:12,padding:"14px",background:"#fff",
      borderRadius:14,marginBottom:8,
      border:isToday?"1px solid #fecaca":"1px solid #f0f0f5",
      boxShadow:isToday?"0 2px 8px rgba(220,38,38,0.08)":"0 1px 4px rgba(0,0,0,0.04)",
      cursor:"pointer",opacity:item.done?0.4:1,transition:"all 0.15s",
    }
  },
    h("div",{
      style:{
        flexShrink:0,width:52,height:52,borderRadius:12,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        background:acBg,border:"1px solid "+acBd,
      }
    },
      h("span",{style:{fontSize:10,fontWeight:700,color:ac,marginBottom:2}},label),
      h("span",{style:{fontSize:15,fontWeight:800,color:ac}},item.time)
    ),
    h("div",{style:{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}},
      h("p",{
        style:{fontSize:15,fontWeight:600,marginBottom:3,
          color:item.done?"#9ca3af":"#111827",
          textDecoration:item.done?"line-through":"none"}
      },item.title),
      h("p",{style:{fontSize:12,color:"#9ca3af"}},item.time+" – "+item.endTime)
    ),
    h(Checkbox,{checked:item.done,onToggle})
  );
}

function StatCard({ label, value, color, bg, border }) {
  return h("div",{
    style:{flex:1,textAlign:"center",padding:"12px 4px",borderRadius:12,background:bg,border:"1px solid "+border}
  },
    h("p",{style:{fontSize:20,fontWeight:800,color:color,lineHeight:1,marginBottom:3}},value),
    h("p",{style:{fontSize:10,fontWeight:600,color:color,opacity:0.65,letterSpacing:"0.03em"}},label)
  );
}

function SectionHeader({ label, count, color, bg, border }) {
  return h("div",{style:{display:"flex",alignItems:"center",gap:7,marginBottom:10,paddingLeft:2}},
    h("div",{style:{width:3,height:14,borderRadius:2,background:color}}),
    h("span",{style:{fontSize:12,fontWeight:700,color:color,letterSpacing:"0.04em"}},label),
    h("span",{
      style:{fontSize:11,fontWeight:700,color:color,padding:"1px 7px",borderRadius:10,background:bg,border:"1px solid "+border}
    },count)
  );
}

/* ─── APP ─── */
function App() {
  const [tab, setTab]           = useState("tasks");
  const [filter, setFilter]     = useState("all");
  const [showDone, setShowDone] = useState(false);
  const [tasks, setTasks]       = useState([]);
  const [meetings, setMeetings] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);

  useEffect(() => {
    fetch(WORKER_URL)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        setTasks(data.tasks.map(t => ({...t, done: false})));
        setMeetings(data.meetings.map(m => ({...m, done: false})));
      })
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, []);

  const toggleTask = id => setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const toggleMtg  = id => setMeetings(p=>p.map(m=>m.id===id?{...m,done:!m.done}:m));

  const projs   = ["all","런케이션","취업률","인턴십","해커톤"];
  const active  = tasks.filter(t=>!t.done);
  const filtered = active
    .filter(t=>filter==="all"||t.project===filter)
    .sort((a,b)=>{
      if(!a.deadline && !b.deadline) return 0;
      if(!a.deadline) return 1;
      if(!b.deadline) return -1;
      return new Date(a.deadline)-new Date(b.deadline);
    });
  const done    = tasks.filter(t=>t.done).filter(t=>filter==="all"||t.project===filter);

  const overdue = filtered.filter(t=>t.deadline&&diffDays(t.deadline)<0);
  const dday    = filtered.filter(t=>t.deadline&&diffDays(t.deadline)===0);
  const soon    = filtered.filter(t=>t.deadline&&diffDays(t.deadline)>0&&diffDays(t.deadline)<=3);
  const week    = filtered.filter(t=>t.deadline&&diffDays(t.deadline)>3&&diffDays(t.deadline)<=7);
  const later   = filtered.filter(t=>!t.deadline||(diffDays(t.deadline)>7));

  const urgent  = overdue.length+dday.length+soon.length;
  const inProg  = tasks.filter(t=>!t.done&&t.status==="진행 중").length;
  const doneMtg = meetings.filter(m=>m.done).length;

  const taskView = h("div",{style:{padding:"16px 16px 100px"}},
    /* 필터 */
    h("div",{style:{display:"flex",gap:6,marginBottom:18,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:2}},
      projs.map(p=>{
        const cnt = p==="all"?active.length:active.filter(t=>t.project===p).length;
        const on  = filter===p;
        const pc  = p!=="all"?PROJ[p]:null;
        return h("button",{
          key:p,onClick:()=>setFilter(p),
          style:{
            fontSize:12,fontWeight:on?700:500,
            padding:"7px 14px",borderRadius:20,flexShrink:0,cursor:"pointer",transition:"all 0.15s",
            background:on?(pc?pc.bg:"#f1f5f9"):"#fff",
            color:on?(pc?pc.color:"#374151"):"#9ca3af",
            border:on?"1.5px solid "+(pc?pc.border:"#cbd5e1"):"1.5px solid #e5e7eb",
            boxShadow:on?"0 1px 4px rgba(0,0,0,0.06)":"none",
          }
        },p==="all"?"전체 "+cnt:p+" "+cnt);
      })
    ),
    (overdue.length+dday.length)>0&&h("div",{style:{marginBottom:20}},
      h(SectionHeader,{label:"긴급",count:overdue.length+dday.length,color:"#dc2626",bg:"#fef2f2",border:"#fecaca"}),
      [...overdue,...dday].map(t=>h(TaskCard,{key:t.id,item:t,onToggle:()=>toggleTask(t.id)}))
    ),
    soon.length>0&&h("div",{style:{marginBottom:20}},
      h(SectionHeader,{label:"마감 임박",count:soon.length,color:"#d97706",bg:"#fffbeb",border:"#fde68a"}),
      soon.map(t=>h(TaskCard,{key:t.id,item:t,onToggle:()=>toggleTask(t.id)}))
    ),
    week.length>0&&h("div",{style:{marginBottom:20}},
      h(SectionHeader,{label:"이번 주",count:week.length,color:"#2563eb",bg:"#eff6ff",border:"#bfdbfe"}),
      week.map(t=>h(TaskCard,{key:t.id,item:t,onToggle:()=>toggleTask(t.id)}))
    ),
    later.length>0&&h("div",{style:{marginBottom:20}},
      h(SectionHeader,{label:"예정",count:later.length,color:"#9ca3af",bg:"#f9fafb",border:"#e5e7eb"}),
      later.map(t=>h(TaskCard,{key:t.id,item:t,onToggle:()=>toggleTask(t.id)}))
    ),
    filtered.length===0&&h("div",{style:{textAlign:"center",padding:"60px 0"}},
      h("p",{style:{fontSize:40,marginBottom:12}},"✓"),
      h("p",{style:{fontSize:17,fontWeight:700,color:"#059669",marginBottom:4}},"모든 업무 완료"),
      h("p",{style:{fontSize:13,color:"#9ca3af"}},"수고하셨습니다")
    ),
    done.length>0&&h("div",{style:{marginTop:8,paddingTop:14,borderTop:"1px solid #f0f0f5"}},
      h("button",{
        onClick:()=>setShowDone(!showDone),
        style:{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#9ca3af",background:"none",border:"none",cursor:"pointer",padding:"4px 2px"}
      },
        h("span",{style:{fontSize:9,display:"inline-block",transition:"transform 0.2s",transform:showDone?"rotate(90deg)":"rotate(0)"}},"▶"),
        "완료 "+done.length+"건"
      ),
      showDone&&done.map(t=>h(TaskCard,{key:t.id,item:t,onToggle:()=>toggleTask(t.id)}))
    )
  );

  const meetView = h("div",{style:{padding:"16px 16px 100px"}},
    meetings.map(m=>h(MeetingCard,{key:m.id,item:m,onToggle:()=>toggleMtg(m.id)}))
  );

  function TabIcon({id,active}){
    const stroke=active?"#2563eb":"#9ca3af",sw=active?2:1.5;
    if(id==="tasks") return h("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke,strokeWidth:sw,strokeLinecap:"round",strokeLinejoin:"round"},
      h("rect",{x:3,y:5,width:18,height:16,rx:3}),h("path",{d:"M8 10h8M8 14h5"})
    );
    return h("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke,strokeWidth:sw,strokeLinecap:"round",strokeLinejoin:"round"},
      h("rect",{x:3,y:4,width:18,height:18,rx:3}),h("path",{d:"M3 9h18M8 2v4M16 2v4"})
    );
  }

  if (loading) return h("div",{style:{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,background:"#f5f7fa"}},
    h("div",{style:{width:32,height:32,border:"3px solid #e5e7eb",borderTopColor:"#2563eb",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}),
    h("p",{style:{fontSize:13,color:"#9ca3af"}},"데이터 불러오는 중…"),
    h("style",null,"@keyframes spin{to{transform:rotate(360deg)}}")
  );

  if (error) return h("div",{style:{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,background:"#f5f7fa",padding:24}},
    h("p",{style:{fontSize:32}},"⚠️"),
    h("p",{style:{fontSize:15,fontWeight:700,color:"#dc2626"}},"데이터 로드 실패"),
    h("p",{style:{fontSize:12,color:"#9ca3af",textAlign:"center"}},error),
    h("button",{onClick:()=>window.location.reload(),style:{marginTop:8,padding:"8px 20px",borderRadius:8,background:"#2563eb",color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}},"다시 시도")
  );

  return h("div",{style:{height:"100%",display:"flex",flexDirection:"column",background:"#f5f7fa"}},

    /* HEADER */
    h("div",{style:{flexShrink:0,background:"#fff",borderBottom:"1px solid #f0f0f5",boxShadow:"0 1px 8px rgba(0,0,0,0.05)",paddingTop:"env(safe-area-inset-top,0px)"}},
      h("div",{style:{padding:"20px 18px 0"}},
        h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:18}},
          h("div",null,
            h("p",{style:{fontSize:11.5,fontWeight:500,color:"#9ca3af",letterSpacing:"0.04em",marginBottom:4}},getToday()),
            h("h1",{style:{fontSize:22,fontWeight:800,color:"#111827",letterSpacing:"-0.02em"}},"봉성님의 업무 현황")
          ),
          urgent>0&&h("div",{
            style:{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:20,marginTop:4,background:"#fef2f2",border:"1px solid #fecaca"}
          },
            h("div",{style:{width:6,height:6,borderRadius:"50%",background:"#ef4444",boxShadow:"0 0 6px rgba(239,68,68,0.5)"}}),
            h("span",{style:{fontSize:12,fontWeight:700,color:"#dc2626"}},urgent+"건 긴급")
          )
        ),
        h("div",{style:{display:"flex",gap:8,marginBottom:18}},
          h(StatCard,{label:"긴급",  value:urgent,             color:"#dc2626",bg:"#fef2f2",border:"#fecaca"}),
          h(StatCard,{label:"진행중",value:inProg,             color:"#2563eb",bg:"#eff6ff",border:"#bfdbfe"}),
          h(StatCard,{label:"미완료",value:filtered.length,    color:"#d97706",bg:"#fffbeb",border:"#fde68a"}),
          h(StatCard,{label:"회의",  value:doneMtg+"/"+meetings.length,color:"#059669",bg:"#ecfdf5",border:"#a7f3d0"})
        ),
        h("div",{style:{display:"flex",borderBottom:"2px solid #f0f0f5"}},
          [{id:"tasks",label:"업무",badge:urgent},{id:"meetings",label:"회의",badge:0}].map(t=>
            h("button",{
              key:t.id,onClick:()=>setTab(t.id),
              style:{
                flex:1,padding:"12px 0 10px",
                fontSize:14,fontWeight:tab===t.id?700:500,
                color:tab===t.id?"#2563eb":"#9ca3af",
                background:"transparent",border:"none",cursor:"pointer",
                borderBottom:tab===t.id?"2px solid #2563eb":"2px solid transparent",
                marginBottom:"-2px",position:"relative",transition:"all 0.15s",
              }
            },
              t.label,
              t.badge>0&&h("span",{
                style:{position:"absolute",top:8,right:10,minWidth:17,height:17,borderRadius:9,padding:"0 4px",background:"#ef4444",color:"#fff",fontSize:9,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center"}
              },t.badge)
            )
          )
        )
      )
    ),

    /* CONTENT */
    h("div",{style:{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}},
      tab==="tasks"?taskView:meetView
    ),

    /* BOTTOM NAV */
    h("div",{style:{flexShrink:0,background:"#fff",borderTop:"1px solid #f0f0f5",boxShadow:"0 -1px 8px rgba(0,0,0,0.05)",paddingBottom:"env(safe-area-inset-bottom,0px)"}},
      h("div",{style:{display:"flex",padding:"6px 0"}},
        [{id:"tasks",label:"업무"},{id:"meetings",label:"회의"}].map(t=>
          h("button",{
            key:t.id,onClick:()=>setTab(t.id),
            style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"8px 0",background:"none",border:"none",cursor:"pointer"}
          },
            h(TabIcon,{id:t.id,active:tab===t.id}),
            h("span",{style:{fontSize:10,fontWeight:tab===t.id?700:400,color:tab===t.id?"#2563eb":"#9ca3af",transition:"color 0.15s"}},t.label)
          )
        )
      )
    )
  );
}

ReactDOM.render(h(App,null),document.getElementById("root"));
</script>
</body>
</html>
