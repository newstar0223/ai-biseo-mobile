function getToday(){const d=new Date(),days=["일","월","화","수","목","금","토"];return d.getFullYear()+"."+(d.getMonth()+1)+"."+d.getDate()+" ("+days[d.getDay()]+")";}
function getShortToday(){const d=new Date(),days=["일","월","화","수","목","금","토"];return(d.getMonth()+1)+"/"+d.getDate()+"("+days[d.getDay()]+")";}
function diffDays(s){const t=new Date();t.setHours(0,0,0,0);const d=new Date(s);d.setHours(0,0,0,0);return Math.floor((d-t)/864e5);}
function urgencyLabel(s){const diff=diffDays(s),d=new Date(s),days=["일","월","화","수","목","금","토"],dt=(d.getMonth()+1)+"/"+d.getDate()+"("+days[d.getDay()]+")";if(diff<0)return{text:"마감초과",color:"#ef4444",bg:"rgba(239,68,68,0.15)"};if(diff===0)return{text:"오늘 마감",color:"#ef4444",bg:"rgba(239,68,68,0.15)"};if(diff<=3)return{text:dt,color:"#f59e0b",bg:"rgba(245,158,11,0.15)"};if(diff<=7)return{text:dt,color:"#38bdf8",bg:"rgba(56,189,248,0.12)"};return{text:dt,color:"#64748b",bg:"rgba(255,255,255,0.04)"};}
function projectColor(p){if(p==="런케이션")return{color:"#6ee7b7",bg:"rgba(110,231,183,0.15)"};if(p==="취업률")return{color:"#c084fc",bg:"rgba(192,132,252,0.15)"};return{color:"#fbbf24",bg:"rgba(251,191,36,0.15)"};}
function statusBadge(s){if(s==="진행 중")return{text:"진행중",color:"#38bdf8",bg:"rgba(56,189,248,0.12)"};return null;}

    )

}

function MeetingCard({item,onToggle}){
  const d=new Date(item.date),days=["일","월","화","수","목","금","토"];
  const dateLabel=(d.getMonth()+1)+"/"+d.getDate()+"("+days[d.getDay()]+")";
  const diff=diffDays(item.date);
  const isToday=diff===0;
  const isTomorrow=diff===1;
  const dayTag=isToday?"오늘":isTomorrow?"내일":dateLabel;
  const tagColor=isToday?"#ef4444":isTomorrow?"#f59e0b":"#38bdf8";

  return React.createElement("div",{onClick:onToggle,style:{padding:"16px",background:isToday?"rgba(239,68,68,0.06)":"rgba(255,255,255,0.02)",borderRadius:12,marginBottom:8,border:isToday?"1px solid rgba(239,68,68,0.2)":"1px solid rgba(255,255,255,0.05)",cursor:"pointer",display:"flex",alignItems:"center",gap:14}},
    React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,minWidth:56}},
      React.createElement("span",{style:{fontSize:11,color:tagColor,fontWeight:700,marginBottom:4,padding:"2px 8px",borderRadius:6,background:isToday?"rgba(239,68,68,0.12)":"rgba(56,189,248,0.08)"}},dayTag),
      React.createElement("span",{style:{fontSize:16,fontWeight:800,color:"#f1f5f9"}},item.time)
    ),
    React.createElement("div",{style:{flex:1,minWidth:0}},
      React.createElement("span",{style:{fontSize:15,fontWeight:600,color:item.done?"#475569":"#f1f5f9",textDecoration:item.done?"line-through":"none",display:"block"}},item.title),

    React.createElement(Checkbox,{checked:item.done,onChange:e=>e.stopPropagation()})
  );
}

        ),
        urgent>0&&React.createElement("div",{style:{padding:"6px 14px",borderRadius:20,background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.3)",display:"flex",alignItems:"center",gap:6}},
          React.createElement("span",{style:{fontSize:14}},"🔥"),
          React.createElement("span",{style:{fontSize:13,fontWeight:700,color:"#ef4444"}},"긴급 "+urgent+"건")
        )
      ),
      React.createElement("div",{style:{display:"flex",gap:8}},
        React.createElement(StatCard,{label:"긴급",value:urgent,color:"#ef4444",icon:"🚨"}),
        React.createElement(StatCard,{label:"진행중",value:inProg,color:"#38bdf8",icon:"⚡"}),
        React.createElement(StatCard,{label:"미완료",value:filtered.length,color:"#f59e0b",icon:"📋"}),
        React.createElement(StatCard,{label:"회의",value:doneMtg+"/"+meetings.length,color:"#6ee7b7",icon:"📅"})
      )
    ),

    /* Scrollable Content */
    React.createElement("div",{style:{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}},
      tabContent
    ),

    /* Bottom Tab Bar */
    React.createElement("div",{style:{flexShrink:0,display:"flex",borderTop:"1px solid rgba(255,255,255,0.08)",background:"rgba(8,15,35,0.98)",backdropFilter:"blur(20px)",paddingBottom:"env(safe-area-inset-bottom)"}},
      [{id:"tasks",label:"업무",icon:"📋",badge:urgent},{id:"meetings",label:"회의",icon:"📅",badge:0}].map(t=>
        React.createElement("button",{key:t.id,onClick:()=>setActiveTab(t.id),style:{flex:1,padding:"12px 0 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",position:"relative",borderTop:activeTab===t.id?"2px solid #38bdf8":"2px solid transparent"}},
          React.createElement("span",{style:{fontSize:20,position:"relative"}},
            t.icon,
            t.badge>0&&React.createElement("span",{style:{position:"absolute",top:-4,right:-10,minWidth:18,height:18,borderRadius:9,background:"#ef4444",color:"white",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}},t.badge)
          ),
          React.createElement("span",{style:{fontSize:11,fontWeight:activeTab===t.id?700:500,color:activeTab===t.id?"#38bdf8":"#64748b"}},t.label)
        )
      )
    ),

    /* Footer */
    React.createElement("div",{style:{flexShrink:0,textAlign:"center",padding:"6px 0",background:"rgba(0,0,0,0.3)",borderTop:"1px solid rgba(255,255,255,0.04)",paddingBottom:"env(safe-area-inset-bottom)"}},
      React.createElement("p",{style:{fontSize:10,color:"#334155"}},"모두연 AI 비서 v2.0m · "+getShortToday())
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
